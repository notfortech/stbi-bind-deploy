name: Build and deploy stbi-bind-deploy to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Restore
        run: dotnet restore src/StbiBindDeploy.Api/StbiBindDeploy.Api.csproj

      - name: Build
        run: dotnet build src/StbiBindDeploy.Api/StbiBindDeploy.Api.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish src/StbiBindDeploy.Api/StbiBindDeploy.Api.csproj --configuration Release --no-build --output publish

      - name: Upload artifact for deploy job
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-app
          path: publish

  deploy:
    runs-on: ubuntu-latest
    needs: build

    permissions:
      id-token: write   # required for OIDC login
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: dotnet-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          # ⚠️ Update this if the actual App Service resource name differs
          app-name: 'stbi-bind-deploy'
          slot-name: 'Production'
          package: .
